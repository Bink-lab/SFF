name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install steam==1.4.4 --no-deps

      - name: Patch win10toast
        shell: pwsh
        run: |
          $win10toast_info = pip show win10toast
          $location = ($win10toast_info | Select-String "Location: ").ToString().Split(" ", 2)[1].Trim()
          $win10toast_path = Join-Path $location "win10toast\__init__.py"
          
          if (Test-Path $win10toast_path) {
              echo "Patching win10toast at $win10toast_path"
              $content = Get-Content $win10toast_path -Raw
              $content = $content -replace 'from pkg_resources import Requirement', '# from pkg_resources import Requirement'
              $content = $content -replace 'from pkg_resources import resource_filename', '# from pkg_resources import resource_filename'
              $content = $content -replace 'icon_path = resource_filename\(Requirement\.parse\("win10toast"\), "win10toast/data/python\.ico"\)', 'import os; icon_path = os.path.join(os.path.dirname(__file__), "data", "python.ico")'
              Set-Content -Path $win10toast_path -Value $content -Encoding utf8
              echo "win10toast patched successfully."
          } else {
              echo "Warning: win10toast path not found at $win10toast_path"
          }

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller build_sff_gui.spec --noconfirm

      - name: Get Build Info
        id: build_info
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          VERSION=$(grep '^VERSION = ' sff/strings.py | cut -d'"' -f2)
          echo "SHA=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install NSIS
        uses: negrutiu/nsis-install@v2

      - name: Build NSIS Installer
        run: |
          makensis /DVERSION=${{ steps.build_info.outputs.SHA }} installer.nsi

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: SteaMidra-Windows-Setup-${{ steps.build_info.outputs.SHA }}
          path: SteaMidra-*-Setup.exe

      - name: Upload Portable Build
        uses: actions/upload-artifact@v4
        with:
          name: SteaMidra-Windows-Portable-${{ steps.build_info.outputs.SHA }}
          path: dist/SteaMidra_GUI/

  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y libfuse2 libatomic1 libnss3 libnspr4 libxkbfile1 \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-xkb1 libxcb-image0 \
            libxcb-keysyms1 libxcb-util1 libxcb-render-util0 libxcb-icccm4 \
            libxcb-shape0 wget
          sudo apt install -y libasound2t64 || sudo apt install -y libasound2

      - name: Install Python Dependencies
        run: |
          pip install -r requirements-linux.txt
          pip install steam==1.4.4 --no-deps
          pip install seleniumbase --no-deps
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller build_sff_linux.spec

      - name: Get Build Info
        id: build_info
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "SHA=$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Create AppDir
        run: |
          mkdir -p SteaMidra.AppDir/usr/bin
          cp -r dist/SteaMidra_GUI/* SteaMidra.AppDir/usr/bin/
          if [ -f "SFF.png" ]; then
            cp SFF.png SteaMidra.AppDir/SteaMidra.png
          fi

      - name: Create AppRun
        run: |
          cat > SteaMidra.AppDir/AppRun << 'APPRUN_EOF'
          #!/usr/bin/env bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/bin:$HERE/usr/lib:${LD_LIBRARY_PATH:-}"
          export QT_PLUGIN_PATH="$HERE/usr/bin/PyQt6/Qt6/plugins"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$HERE/usr/bin/PyQt6/Qt6/plugins/platforms"
          export QTWEBENGINE_DISABLE_SANDBOX=1
          exec "$HERE/usr/bin/SteaMidra_GUI" "$@"
          APPRUN_EOF
          chmod +x SteaMidra.AppDir/AppRun

      - name: Create Desktop File
        run: |
          cat > SteaMidra.AppDir/SteaMidra.desktop << 'EOF'
          [Desktop Entry]
          Name=SteaMidra
          Exec=SteaMidra_GUI
          Icon=SteaMidra
          Terminal=false
          Type=Application
          Categories=Utility;
          EOF

      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          ./appimagetool SteaMidra.AppDir SteaMidra-${{ steps.build_info.outputs.SHA }}-x86_64.AppImage
        env:
          ARCH: x86_64

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SteaMidra-Linux-AppImage-${{ steps.build_info.outputs.SHA }}
          path: SteaMidra-*-x86_64.AppImage

  create-nightly:
    name: Create Nightly Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Build Info
        id: build_info
        run: |
          SHA=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +'%Y%m%d-%H%M%S')
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "TAG=nightly-$BUILD_TIME-$SHA" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: generate_notes
        run: |
          # Find the latest tag to use as base for the changelog
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # Fallback to initial commit if no tags exist
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Using $PREVIOUS_TAG as base for changelog"
          
          echo "## 🌙 Nightly Build (${{ steps.build_info.outputs.SHA }})" > release_notes.md
          echo "This is an automated build from the latest commits on the \`main\` branch." >> release_notes.md
          echo "**Note:** Nightly builds may be unstable. Use at your own risk." >> release_notes.md
          echo "" >> release_notes.md
          
          # Only add "Changes since" if there are actual new commits
          NEW_COMMITS=$(git log $PREVIOUS_TAG..HEAD --oneline)
          if [ -z "$NEW_COMMITS" ]; then
            echo "No new changes since last build." >> release_notes.md
          else
            echo "### 📝 Changes since $PREVIOUS_TAG" >> release_notes.md
            git log $PREVIOUS_TAG..HEAD --oneline --pretty=format:"* %s (%h)" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...main" >> release_notes.md

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets
        run: |
          mkdir release_assets
          SHA=${{ steps.build_info.outputs.SHA }}
          echo "Commit SHA: $SHA"

          # Windows Setup
          SETUP_SRC=$(find artifacts -name "SteaMidra-*-Setup.exe" | head -n 1)
          cp "$SETUP_SRC" "release_assets/SteaMidra-Windows-Setup-$SHA.exe"
          
          # Linux AppImage
          APPIMAGE_SRC=$(find artifacts -name "SteaMidra-*-x86_64.AppImage" | head -n 1)
          cp "$APPIMAGE_SRC" "release_assets/SteaMidra-Linux-AppImage-$SHA.AppImage"
          
          # Zip the Portable Windows build
          PORTABLE_DIR=$(find artifacts -type d -name "SteaMidra-Windows-Portable-*" | head -n 1)
          if [ -d "$PORTABLE_DIR" ]; then
            echo "Zipping portable build from $PORTABLE_DIR"
            cd "$PORTABLE_DIR" && zip -r "../../release_assets/SteaMidra-Windows-Portable-$SHA.zip" . && cd ../..
          fi
          
          echo "Final assets for release:"
          ls -R release_assets/

      - name: Create Annotated Tag
        run: |
          TAG="${{ steps.build_info.outputs.TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Nightly Build (${{ steps.build_info.outputs.SHA }})"
            git push origin "$TAG"
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_info.outputs.TAG }}
          name: Nightly Build (${{ steps.build_info.outputs.SHA }})
          body_path: release_notes.md
          prerelease: true
          files: release_assets/*
          generate_release_notes: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
